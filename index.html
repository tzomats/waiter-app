<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Waiter</title>
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #4cc9f0;
            --danger: #f72585;
            --warning: #f9c74f;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #1f2937;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        .table-info {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
            font-weight: 800;
            margin-bottom: 5px;
        }

        h1 { font-size: 24px; margin-top: 0; color: #111827; }

        textarea {
            width: 100%;
            height: 100px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            padding: 15px;
            font-size: 16px;
            margin: 15px 0;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
            background: #f9fafb;
        }

        textarea:focus { border-color: var(--primary); background: white; }

        .btn {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-mic { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3); }
        .btn-send { background: #10b981; color: white; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .btn-waiter { background: #f59e0b; color: white; margin-top: 10px; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); }

        .btn:active { transform: scale(0.96); }

        .footer-text { font-size: 12px; color: #9ca3af; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div class="table-info">ΤΡΑΠΕΖΙ <span id="table-num">0</span></div>
    <h1>Παραγγελία</h1>

    <textarea id="order-text" placeholder="Πείτε την παραγγελία σας..."></textarea>

    <button class="btn btn-mic" id="mic-btn" onclick="toggleMic()">
        <span id="mic-icon">🎤</span> <span id="mic-label">Ξεκινήστε την Ομιλία</span>
    </button>

    <button class="btn btn-send" onclick="sendOrder()">
        <span>🚀</span> Αποστολή
    </button>

    <div style="height: 1px; background: #eee; margin: 20px 0;"></div>

    <button class="btn btn-waiter" onclick="callWaiter()">
        <span>🔔</span> Κλήση Σερβιτόρου
    </button>

    <div style="margin-top: 25px; text-align: center; opacity: 0.9;">
    <p style="color: #666; font-size: 0.75rem; margin-bottom: 8px; font-family: sans-serif;">Developed by</p>
    <a href="https://WWW.IEPIRUS.GR" target="_blank">
        <img src="https://github.com/tzomats/waiter-app/blob/main/iepirus.png" alt="Company Logo" style="height: 40px; width: auto; filter: grayscale(20%); transition: 0.3s;">
    </a>
</div>
</div>

<script>
    const token = "8597389134:AAGpXgvvHgWg0SHhsQUiZF4Fsg0bq6XmoNA";
    const chatId = "8228642098";
    const urlParams = new URLSearchParams(window.location.search);
    const table = urlParams.get('table') || "Άγνωστο";
    document.getElementById('table-num').innerText = table;

    // --- ΡΥΘΜΙΣΕΙΣ ΓΕΩΕΝΤΟΠΙΣΜΟΥ ---
    const STORE_LAT = 39.234732; // Βάλε εδώ το Latitude του μαγαζιού
    const STORE_LON = 20.601351; // Βάλε εδώ το Longitude του μαγαζιού
    const MAX_DISTANCE = 0.1;  // Απόσταση ασφαλείας (0.1 = 100 μέτρα)

    let recognition;
    let isRecording = false;

    // Συνάρτηση υπολογισμού απόστασης (Haversine Formula)
    function checkLocation(callback) {
        if (!navigator.geolocation) {
            alert("Ο γεωεντοπισμός δεν υποστηρίζεται. Δοκιμάστε άλλον browser.");
            return;
        }

        navigator.geolocation.getCurrentPosition((position) => {
            const R = 6371; 
            const dLat = (position.coords.latitude - STORE_LAT) * Math.PI / 180;
            const dLon = (position.coords.longitude - STORE_LON) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(STORE_LAT * Math.PI / 180) * Math.cos(position.coords.latitude * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            const distance = R * c;

            if (distance <= MAX_DISTANCE) {
                callback(); // Αν είναι κοντά, εκτέλεσε την αποστολή
            } else {
                alert("Πρέπει να βρίσκεστε στο κατάστημα για να στείλετε παραγγελία!");
            }
        }, () => {
            alert("Παρακαλώ ενεργοποιήστε την τοποθεσία στο κινητό σας για να παραγγείλετε.");
        });
    }

    // --- ΟΙ ΔΙΚΕΣ ΣΟΥ ΣΥΝΑΡΤΗΣΕΙΣ (ΧΩΡΙΣ ΑΛΛΑΓΕΣ ΣΤΗ ΛΟΓΙΚΗ) ---
    function toggleMic() {
        const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        if (!SpeechRecognition) return alert("Ο browser δεν υποστηρίζει φωνή.");
        if (!isRecording) {
            recognition = new SpeechRecognition();
            recognition.lang = "el-GR";
            recognition.interimResults = true;
            recognition.continuous = true;
            recognition.onstart = () => { isRecording = true; updateMicUI(true); };
            recognition.onresult = (event) => {
                let text = "";
                for (let i = 0; i < event.results.length; i++) { text += event.results[i][0].transcript; }
                document.getElementById('order-text').value = text;
            };
            recognition.start();
        } else { stopMic(); }
    }

    function stopMic() {
        if (recognition) {
            recognition.stop();
            setTimeout(() => { 
                recognition.abort(); 
                recognition = null; 
                isRecording = false;
                updateMicUI(false);
            }, 300);
        }
    }

    function updateMicUI(recording) {
        const btn = document.getElementById('mic-btn');
        const label = document.getElementById('mic-label');
        const icon = document.getElementById('mic-icon');
        if (recording) {
            btn.style.background = "#f72585";
            label.innerText = "ΤΕΛΟΣ (Πατήστε)";
            icon.innerText = "🛑";
        } else {
            btn.style.background = "#4361ee";
            label.innerText = "Ξεκινήστε την Ομιλία";
            icon.innerText = "🎤";
        }
    }

    // Εδώ προσθέτουμε το checkLocation πριν την αποστολή
    function callWaiter() { 
        checkLocation(() => {
            sendToTelegram(`🔔 ΚΛΗΣΗ ΣΕΡΒΙΤΟΡΟΥ\n📍 Τραπέζι: ${table}`, "Ο σερβιτόρος ειδοποιήθηκε!"); 
        });
    }

    function sendOrder() {
        const text = document.getElementById('order-text').value;
        if (!text) return alert("Πείτε κάτι πρώτα!");
        checkLocation(() => {
            sendToTelegram(`📝 ΝΕΑ ΠΑΡΑΓΓΕΛΙΑ\n📍 Τραπέζι: ${table}\n💬: ${text}`, "Η παραγγελία εστάλη!");
        });
    }

    function sendToTelegram(msg, successMsg) {
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`)
        .then(() => {
            document.getElementById('app').innerHTML = `
                <div style="padding:40px 0; text-align:center;">
                    <div style="font-size:60px; margin-bottom:20px;">✅</div>
                    <h2 style="margin:0;">${successMsg}</h2>
                    <p style="color:#666;">Ευχαριστούμε πολύ!</p>
                    <button class="btn" onclick="location.reload()" style="margin-top:20px; background:#4361ee; color:white; padding:10px 20px; border:none; border-radius:10px;">Νέα Ενέργεια</button>
                </div>`;
        });
    }
</script>
</body>
</html>
